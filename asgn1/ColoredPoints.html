<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Change a point color</title>
  </head>

  <body onload="main()">
    <canvas id="webgl" width="400" height="400">
    Please use a browser that supports "canvas"
    </canvas>
    <br>
    <button id="green">Green</button>
    <button id="red">Red</button>
    <button id="clearButton">Clear</button>
    <button id="linkButton">Draw Link</button>
    <button id="playGameButton">Play Game</button>
    <p id="gameMessage" style="font-size:20px; color:red; font-weight:bold; display:none;">Dodge the ball! Use WASD keys to move.</p>
    <p id="gameOverMessage" style="font-size:24px; color:red; font-weight:bold; display:none;">Game Over!</p>
    <p id="timerDisplay" style="font-size:18px; font-weight:bold; display:none;">Time: 0.0s</p>
    <p id="highScoreDisplay" style="font-size:18px; font-weight:bold; color:gold;"></p>
    <br><br>
    <button id="pointButton">Point</button>
    <button id="triButton">Triangle</button>
    <button id="circleButton">Circle</button>
    <p>
      Red <input type="range" min="0" max="100" value="100" class="slider" id="redSlide">
    </p>
    <p>
      Green <input type="range" min="0" max="100" value="100" class="slider" id="greenSlide">
    </p>
    <p>
      Blue <input type="range" min="0" max="100" value="100" class="slider" id="blueSlide">
    </p>
    <p>
      Size <input type="range" min="5" max="40" value="10" class="slider" id="sizeSlide">
    </p>
    <p id="numdot"></p>

    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="Point.js"></script>
    <script src="Triangle.js"></script>
    <script src="Circle.js"></script>
    <script src="ColoredPoints.js"></script>
    <script src="Game.js"></script>
  </body>
</html>
